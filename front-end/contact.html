<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Contact</title>
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<!-- header -->
	<header id ="top" class="header">
		<!-- logo    <img src=""  height="125" alt=""> -->
		<h1>Plan-iT</h1>
	</header>
	
	<!-- Navigation bar  -->
	<nav class="navbar">
		<ul>
			<li><a href="index.html">Home</a></li>
			<li><a href="groups_main.html">Groups</a>
			<li><a href="profile.html">Profile</a>
			<li class="dropdown"><a href="contact.html">Contact</a></li>
				
		</ul>
	</nav>
	
	<!-- main code -->
	<main class="form_page">
		<form class="form" >
			<h2>Contact Us</h2>

			<div class="form-group">
					<label for="username">Username:</label>
					<input type="text" id="userame" name="username" required>
				</div>

				<div class="form-group">
					<label for="email">Email:</label>
					<input type="email" id="email" name="email" required>
				</div>

				<div class="form-group">
					<label for="subject">Subject:</label>
					<input type="text" id="subject" name="subject" required>
				</div>

				<div class="form-group">
					<label for="message">Message:</label>
					<textarea type="text" id="message" name="message" required></textarea>
				</div>

				<button class="btn" id="form_btn" type="submit">Send Message</button>
			</form>

	</main>
	<script>
		document.getElementById("contactForm")
		.addEventListener("submit", function(e) {
  			e.preventDefault();

  		var formData = new FormData(this);
  		var data = {};

  		formData.forEach((value, key) => {
    		data[key] = value;
  		});

  		fetch("https://script.google.com/macros/s/AKfycbwQTc1d5I_K9K5dnNfUmLlMWkzf6aDVouJD-_79YTHxkoJEesotw92BzyYibVbb-46K/exec", {
    		method: "POST",
    		body: JSON.stringify(data)
  		})
	  .then(response => response.json())
	  .then(result => {
		alert("Message sent successfully!");
		document.getElementById("contactForm").reset();
	  })
	  .catch(error => {
		alert("Error submitting form.");
	  });
	});
</script>
</body>
</html>
