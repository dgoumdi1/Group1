# PostgreSQL database configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://${PGHOST:127.0.0.1}:${PGPORT:5433}/${PGDATABASE:productivitybuddy}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER:${PGUSER:postgres}}
spring.datasource.password=${DB_PASSWORD:${PGPASSWORD:postgres}}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
